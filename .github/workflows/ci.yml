name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint web app
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run backend tests
        run: pytest

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Kinoboxd server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/kinoboxd
            git fetch origin main
            git reset --hard origin/main
            npm ci --prefix apps/web
            npm run build --prefix apps/web
            pm2 reload kinoboxd-web || true
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d
            docker compose -f docker-compose.dev.yml exec -T api bash -c 'cd /app && set -a && source .env.docker && alembic -c /app/alembic.ini upgrade head'
            docker compose -f docker-compose.dev.yml restart api celery-worker
